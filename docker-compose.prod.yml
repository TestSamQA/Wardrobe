# Production compose — uses the pre-built image from ghcr.io.
# Deploy via Portainer → Stacks → Add stack → Repository.
#
# Required environment variables (set in Portainer's "Env" tab):
#
#   APP_IMAGE            ghcr.io/your-github-username/wardrobe:latest
#   POSTGRES_PASSWORD    strong random password
#   MINIO_ROOT_USER      minio admin username
#   MINIO_ROOT_PASSWORD  strong random password
#   NEXTAUTH_URL         http://192.168.1.56:3000  (your server's Tailscale/LAN IP + port)
#   AUTH_SECRET          run: openssl rand -base64 32
#   EMAIL_SERVER         smtp://user:pass@host:587
#   EMAIL_FROM           Wardrobe <noreply@yourdomain.com>
#   ANTHROPIC_API_KEY    sk-ant-...
#   REPLICATE_API_TOKEN  r8_...

name: wardrobe

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wardrobe}
      POSTGRES_USER: ${POSTGRES_USER:-wardrobe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wardrobe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/wardrobe-images;
        mc mb --ignore-existing local/wardrobe-thumbnails;
        mc anonymous set none local/wardrobe-images;
        mc anonymous set none local/wardrobe-thumbnails;
        exit 0;
      "
    networks:
      - internal

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "4221:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wardrobe}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wardrobe}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      EMAIL_SERVER: ${EMAIL_SERVER}
      EMAIL_FROM: ${EMAIL_FROM}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_IMAGES: wardrobe-images
      MINIO_BUCKET_THUMBNAILS: wardrobe-thumbnails
      MINIO_PUBLIC_BASE_URL: /api/images
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL}
    networks:
      - internal

volumes:
  postgres_data:
  minio_data:

networks:
  internal:
    driver: bridge
